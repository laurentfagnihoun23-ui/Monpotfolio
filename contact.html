<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacter Laurent FAGNIHOUN</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <!-- CSS Interne -->
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #212529;
        --card-bg: #ffffff;
        --border-color: #dee2e6;
        --accent-color: #0d6efd;
      }
      body.dark-theme {
        --bg-color: #121212;
        --text-color: #f8f9fa;
        --card-bg: #1e1e1e;
        --border-color: #333333;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        transition:
          background-color 0.3s,
          color 0.3s;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      body.dark-theme .bg-light {
        background-color: #1a1a1a !important;
        color: #fff !important;
      }
      body.dark-theme .text-muted {
        color: #aaa !important;
      }

      .form-control {
        border-radius: 8px;
        padding: 0.6rem 1rem;
        border: 1px solid var(--border-color);
        background-color: var(--card-bg);
        color: var(--text-color);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .form-control:focus {
        border-color: var(--accent-color);
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
      }
      body.dark-theme .form-control {
        background-color: #2b2b2b;
        border-color: #444444;
        color: #ffffff;
      }
      body.dark-theme .form-control:focus {
        background-color: #333333;
        color: #ffffff;
      }
      .card {
        background-color: var(--card-bg);
        border: 1px solid var(--border-color) !important;
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.html"
          >Laurent_F.</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Accueil</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="projets.html">Mes Projets</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="contact.html">Contact</a>
            </li>
            <li class="nav-item ms-lg-3">
              <button
                id="darkModeToggle"
                class="btn btn-outline-secondary btn-sm mt-2 mt-lg-0"
              >
                <i class="bi bi-moon-fill"></i>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-5 my-5">
      <div class="row g-5">
        <div class="col-lg-5">
          <h1 class="fw-bold mb-3">Travaillons ensemble !</h1>
          <p class="text-muted mb-4">
            Vous cherchez un profil rigoureux et prêt à s'investir immédiatement
            sur la création de vos sites web ? Rencontrons-nous.
          </p>
          <div class="d-flex align-items-center mb-3">
            <div class="bg-primary text-white rounded p-3 me-3">
              <i class="bi bi-envelope"></i>
            </div>
            <div>
              <p class="mb-0 text-muted small">Mon adresse e-mail pro</p>
              <p class="mb-0 fw-bold">laurentfagnihoun23@gmail.com</p>
            </div>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="card p-4 border-0 shadow-sm">
            <!-- Formulaire -->
            <form id="portfolioContactForm" novalidate>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label small fw-bold"
                    >Nom / Entreprise</label
                  ><input
                    type="text"
                    class="form-control"
                    required
                    placeholder="Votre nom"
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold"
                    >Email de contact</label
                  ><input
                    type="email"
                    class="form-control"
                    required
                    placeholder="nom@entreprise.com"
                  />
                </div>
                <div class="col-12">
                  <label class="form-label small fw-bold"
                    >Votre besoin (Projet, demande d'entretien...)</label
                  ><textarea
                    class="form-control"
                    rows="5"
                    required
                    placeholder="Décrivez votre projet de site web..."
                  ></textarea>
                </div>
                <div class="col-12">
                  <button type="submit" class="btn btn-primary px-4">
                    Envoyer le message
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script Dark Mode + Validation de formulaire -->
    <script>
      // Mode Sombre
      const darkModeToggle = document.getElementById("darkModeToggle");
      const body = document.body;

      if (localStorage.getItem("theme") === "dark") {
        body.classList.add("dark-theme");
        darkModeToggle.innerHTML = '<i class="bi bi-sun-fill"></i>';
      }

      darkModeToggle.addEventListener("click", () => {
        body.classList.toggle("dark-theme");
        if (body.classList.contains("dark-theme")) {
          localStorage.setItem("theme", "dark");
          darkModeToggle.innerHTML = '<i class="bi bi-sun-fill"></i>';
        } else {
          localStorage.setItem("theme", "light");
          darkModeToggle.innerHTML = '<i class="bi bi-moon-fill"></i>';
        }
      });

      // Validation du Formulaire de contact
      document
        .getElementById("portfolioContactForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          if (!this.checkValidity()) {
            event.stopPropagation();
            this.classList.add("was-validated");
          } else {
            alert(
              "Merci ! Votre message a été simulé avec succès. Laurent vous répondra rapidement.",
            );
            this.reset();
            this.classList.remove("was-validated");
          }
        });
    </script>
  </body>
</html>
